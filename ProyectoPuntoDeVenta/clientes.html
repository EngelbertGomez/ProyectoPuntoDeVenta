<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes - AutoParts POS</title>
    <link rel="stylesheet" href="styles.css">

    <style>
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            gap: 16px;
            flex-wrap: wrap;
        }

        .page-header h2 {
            margin: 0;
            color: var(--primary);
            font-size: 1.6rem;
        }

        .client-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin-bottom: 24px;
            padding: 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
        }

        .client-form input {
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.95rem;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
        }

        .btn-primary:hover {
            background: #1a252f;
            transform: translateY(-2px);
        }

        .table-container {
            background: var(--surface);
            border-radius: 14px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 16px 20px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            background: #f8fafc;
            color: var(--muted);
            font-weight: 600;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            font-size: 0.95rem;
            color: var(--text);
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        tbody tr:hover {
            background-color: #fbfcfd;
        }

        .badge {
            background: #eef2f7;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.85rem;
            color: var(--primary);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="brand">⚙️ AutoParts POS</div>
        <ul class="nav-menu">
            <a href="../index.html" class="nav-item">📊 Dashboard</a>
            <a href="pos.html" class="nav-item">🛒 Terminal de Ventas</a>
            <a href="inventario.html" class="nav-item">📦 Inventario</a>
            <a href="clientes.html" class="nav-item active">👥 Clientes</a>
            <a href="reportes.html" class="nav-item">📈 Reportes</a>
        </ul>
    </aside>

    <main class="main-content">
        <div class="page-header">
            <h2>Directorio de Clientes</h2>
            <button class="btn-primary" type="button" onclick="document.getElementById('nombre').focus()">+ Registrar Cliente</button>
        </div>

        <form class="client-form" id="client-form">
            <input id="nombre" name="nombre" placeholder="Nombre" required>
            <input id="telefono" name="telefono" placeholder="Teléfono" required>
            <input id="localidad" name="localidad" placeholder="Localidad" required>
            <input id="vehiculo" name="vehiculo" placeholder="Vehículo principal" required>
            <input id="totalComprado" name="totalComprado" placeholder="Total comprado" type="number" min="0" required>
            <button class="btn-primary" type="submit">Guardar Cliente</button>
        </form>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Teléfono</th>
                        <th>Localidad</th>
                        <th>Vehículo Principal</th>
                        <th>Total Comprado</th>
                    </tr>
                </thead>
                <tbody id="clientes-table-body"></tbody>
            </table>
        </div>
    </main>

    <script src="db.js"></script>
    <script src="clientes.js"></script>
</body>
</html>

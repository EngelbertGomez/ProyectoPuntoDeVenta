<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS - Taller y Repuestos</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main>
        <section class="products-section">
            <div class="header">
                <h2>📦 Terminal de Ventas - Repuestos</h2>
            </div>
            <div class="grid" id="product-grid">
                </div>
        </section>

        <aside class="cart-section">
            <h2>🛒 Facturación Actual</h2>
            <div class="cart-actions">
                <button id="btn-clear" class="btn-clear">Vaciar</button>
            </div>
            <div class="cart-items" id="cart-items">
                </div>
            <div class="totals">
                <div class="total-row">
                    <span>Total:</span>
                    <span id="cart-total">RD$ 0.00</span>
                </div>
                <button id="btn-checkout" class="btn-checkout">Procesar Pago</button>
                <div id="status-message" class="status-message"></div>
            </div>
        </aside>
    </main>

    <script defer src="script.js"></script>
</body>
</html>
